<!DOCTYPE html>
<html>

<head>
    <title>FastSpring SDK — Vanilla Example</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen py-8">
    <div class="max-w-6xl mx-auto px-4">
        <h1 class="text-3xl font-bold text-gray-900 mb-8 text-center">FastSpring Checkout — Vanilla JS</h1>
        <div class="bg-white rounded-lg shadow-md p-6 mb-6">
            <div class="flex gap-6 items-start">
                <!-- Session Input + Checkout Button -->
                <div class="flex-shrink-0" style="width: 450px;">
                    <h2 class="text-xl font-semibold text-gray-800 mb-4">Enter Session ID and Checkout</h2>

                    <div class="mb-4">
                        <label for="session-id-input" class="block text-sm font-medium text-gray-700 mb-2">Session ID:</label>
                        <input type="text" id="session-id-input" value="" placeholder="Enter session ID"
                            class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500" />
                    </div>

                    <div class="mb-4 flex items-center gap-3">
                        <label for="bg-color-input" class="text-sm font-medium text-gray-700 whitespace-nowrap">Card background color:</label>
                        <input type="text" id="bg-color-input" value="#000000" maxlength="7" placeholder="#000000"
                            class="w-32 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 font-mono text-sm" />
                    </div>

                    <div class="mb-4 flex items-center gap-3">
                        <label for="border-color-input" class="text-sm font-medium text-gray-700 whitespace-nowrap">Border color:</label>
                        <input type="text" id="border-color-input" value="#DEE2E6" maxlength="7" placeholder="#DEE2E6"
                            class="w-32 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 font-mono text-sm" />
                    </div>

                    <div class="mb-4 flex items-center gap-3">
                        <label for="border-width-input" class="text-sm font-medium text-gray-700 whitespace-nowrap">Border width:</label>
                        <input type="text" id="border-width-input" value="1px" placeholder="1px"
                            class="w-32 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 font-mono text-sm" />
                    </div>

                    <div class="mb-4 flex items-center gap-3">
                        <label for="border-radius-input" class="text-sm font-medium text-gray-700 whitespace-nowrap">Border radius:</label>
                        <input type="text" id="border-radius-input" value="8px" placeholder="8px"
                            class="w-32 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 font-mono text-sm" />
                    </div>

                    <div class="mb-4 flex items-center gap-3">
                        <label for="padding-input" class="text-sm font-medium text-gray-700 whitespace-nowrap">Padding:</label>
                        <input type="text" id="padding-input" value="28px" placeholder="28px"
                            class="w-32 px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-blue-500 focus:border-blue-500 font-mono text-sm" />
                    </div>

                    <button onclick="checkout()"
                        class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-lg transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                        Checkout
                    </button>
                </div>

                <!-- Payment Components -->
                <div class="flex-1">
                    <div id="payment-form-container">
                        <div id="card-element" class="mb-6"></div>
                        <div id="pay-button-element" class="mb-6 p-4 rounded-lg shadow-sm mx-auto"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://d1f8f9xcsvx3ha.cloudfront.net/checkout-sdk/0.0.3-beta.1/fastspring-sdk.iife.js"></script>

    <script>
        const sdk = FastSpring.init({
            checkoutUrl: 'https://netstoreadriana.qa2.onfastspring.com/popup-AAdryDark1',
            env: "qa2",
            globalStyles: {},
            onOrderCompletion: (data) => {
                console.log('Order completed!', data);
            },
            onPaymentError: (error) => {
                console.error('Payment failed:', error);
            },
            onSessionData: (data) => {
                console.log('Session data ready:', data);
            },
        });

        const storedSessionId = sdk.getStoredSessionId();
        if (storedSessionId) {
            document.getElementById('session-id-input').value = storedSessionId;
        }

        let cardComponent = null;

        const payButtonComponent = sdk.components.create('fsc-pay-button', {
            style: {
                state: {
                    default: {
                        button: {
                            borderRadius: '8px',
                            padding: '14px 28px',
                            fontFamily: 'Inter, sans-serif',
                        },
                    },
                    hover: {
                        button: {
                            opacity: '0.9',
                        },
                    },
                },
            },
        });
        payButtonComponent.mount('#pay-button-element');

        function checkout() {
            const sessionId = document.getElementById('session-id-input').value.trim();
            const backgroundColor = document.getElementById('bg-color-input').value;
            const borderColor = document.getElementById('border-color-input').value;
            const borderWidth = document.getElementById('border-width-input').value;
            const borderRadius = document.getElementById('border-radius-input').value;
            const padding = document.getElementById('padding-input').value;

            sdk.checkout(sessionId, {
                onSuccess: () => {
                    console.log('Session loaded successfully:', sessionId);

                    if (cardComponent) {
                        try { cardComponent.unmount(); } catch(e) {}
                        document.getElementById('card-element').innerHTML = '';
                    }

                    cardComponent = sdk.components.create('fsc-card', {
                        style: {
                            state: {
                                default: {
                                    card: {
                                        backgroundColor: backgroundColor,
                                        borderColor: borderColor,
                                        borderWidth: borderWidth,
                                        borderRadius: borderRadius,
                                        padding: padding,
                                    },
                                },
                            },
                        },
                    });

                    cardComponent.mount('#card-element');
                },
                onError: (error) => {
                    console.error('Session load failed:', error);
                },
            });
        }
    </script>
</body>

</html>
